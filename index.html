<!DOCTYPE html>
<html>
<head>
<title>Internasional Soil Sciens</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#4b3222;
    font-family:Arial, sans-serif;
}

/* ================= DESKTOP ================= */

@media(min-width:769px){

.hero{
    position:relative;
    width:90%;
    height:75vh;
    margin:60px auto; /* ruang sendiri */
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,0.5); /* efek cinematic */
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(70%);
    animation:zoomCinematic 8s ease-in-out infinite alternate;
}

@keyframes zoomCinematic{
    0%{transform:scale(1);}
    100%{transform:scale(1.08);}
}

}

/* ================= HERO UMUM ================= */

.judul-box{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(123,79,44,0.9);
    padding:15px 40px;
    border-radius:25px;
}

.judul{
    font-family:'Montserrat',sans-serif;
    font-size:30px;
    color:white;
    margin:0;
    text-transform:uppercase;
}

.container{
    display:flex;
    justify-content:space-between;
    width:90%;
    margin:40px auto;
}

.sidebar{
    width:200px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.sidebar img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:18px;
}

.menu{
    width:280px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
}

.menu a{
    width:220px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-family:'Montserrat',sans-serif;
    font-weight:900;
    font-size:24px;
    color:white;
    background:#7b4f2c;
    border-radius:40px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.hero{
    height:70vh;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:gerakHP 5s ease-in-out infinite alternate;
}

@keyframes gerakHP{
    0%{transform:translateY(0);}
    100%{transform:translateY(-60px);}
}

.judul-box{
    width:85%;
    bottom:60px;
    padding:10px;
}

.judul{
    font-size:18px;
    text-align:center;
}

.sidebar{
    flex-direction:row;
    overflow:hidden;
}

.sidebar-track{
    display:flex;
    gap:15px;
    animation:scrollCepat 10s linear infinite;
}

.sidebar img{
    width:170px;
    height:120px;
    flex-shrink:0;
}

.sidebar > img{
    display:none;
}

@keyframes scrollCepat{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

.container{
    flex-direction:column;
    align-items:center;
    gap:40px;
}

.menu{
    gap:25px;
}

.menu a{
    width:85%;
    height:60px;
    font-size:18px;
}

}

</style>
</head>
<body>

<div class="hero">
    <img src="Foto1.jpeg">
    <div class="judul-box">
        <h1 class="judul">Internasional Soil Sciens</h1>
    </div>
</div>

<div class="container">

    <!-- FOTO KIRI -->
    <div class="sidebar">
        <div class="sidebar-track">
            <img src="Foto2.jpeg">
            <img src="Foto3.jpeg">
            <img src="Foto4.jpeg">
            <img src="Foto5.jpeg">
            <img src="Foto6.jpeg">
            <img src="Foto7.jpeg">
            <img src="Foto2.jpeg">
            <img src="Foto3.jpeg">
        </div>
    </div>

    <!-- MENU -->
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Timetable</a>
        <a href="#">Subject</a>
    </div>

    <!-- FOTO KANAN -->
    <div class="sidebar">
        <div class="sidebar-track">
            <img src="Foto8.jpeg">
            <img src="Foto9.jpeg">
            <img src="Foto10.jpeg">
            <img src="Foto11.jpeg">
            <img src="Foto12.jpeg">
            <img src="Foto13.jpeg">
            <img src="Foto8.jpeg">
            <img src="Foto9.jpeg">
        </div>
    </div>

</div>

</body>
</html>
