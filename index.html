<!DOCTYPE html>
<html>
<head>
<title>Internasional Soil Sciens</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#4b3222;
    font-family:Arial, sans-serif;
}

/* ===================== DESKTOP ONLY ===================== */
.desktop{
    display:block;
}
.mobile{
    display:none;
}

.hero-desktop{
    position:relative;
    height:60vh;
    overflow:hidden;
}
.hero-desktop img{
    width:100%;
    height:250%;
    object-fit:cover;
    filter:brightness(65%);
    animation:gerakDesktop 4s ease-in-out infinite alternate;
}
@keyframes gerakDesktop{
    0%{transform:translateY(0);}
    100%{transform:translateY(-600px);}
}

.judul-desktop{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(123,79,44,0.85);
    padding:15px 40px;
    border-radius:25px;
}
.judul-desktop h1{
    font-family:'Montserrat',sans-serif;
    color:white;
    font-size:30px;
    margin:0;
    text-transform:uppercase;
}

.container-desktop{
    display:flex;
    justify-content:space-between;
    width:90%;
    margin:40px auto;
}
.sidebar-desktop{
    width:200px;
    display:flex;
    flex-direction:column;
    gap:20px;
}
.sidebar-desktop img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:18px;
}
.menu-desktop{
    width:280px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}
.menu-desktop a{
    width:220px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-family:'Montserrat',sans-serif;
    font-weight:900;
    font-size:24px;
    color:white;
    background:#7b4f2c;
    border-radius:40px;
}

/* ===================== MOBILE ONLY ===================== */
@media(max-width:768px){

.desktop{display:none;}
.mobile{display:block;}

.hero-mobile{
    position:relative;
    height:65vh;
    overflow:hidden;
}
.hero-mobile img{
    width:100%;
    height:180%;
    object-fit:cover;
    animation:gerakHP 3s ease-in-out infinite alternate;
}
@keyframes gerakHP{
    0%{transform:translateY(0);}
    100%{transform:translateY(-80px);}
}

.judul-mobile{
    position:absolute;
    bottom:70px; /* NAIK */
    left:50%;
    transform:translateX(-50%);
    background:#7b4f2c;
    width:85%; /* FULL */
    text-align:center;
    padding:10px;
    border-radius:15px;
}
.judul-mobile h1{
    font-family:'Montserrat',sans-serif;
    font-size:18px;
    color:white;
    margin:0;
}

/* SCROLL FOTO CEPAT */
.scroll{
    overflow:hidden;
    margin:25px 0;
}
.track{
    display:flex;
    gap:15px;
    animation:scrollCepat 8s linear infinite;
}
.track img{
    width:170px;
    height:120px;
    border-radius:18px;
    object-fit:cover;
    flex-shrink:0;
}
@keyframes scrollCepat{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

.menu-mobile{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    margin:40px 0;
}
.menu-mobile a{
    width:85%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-family:'Montserrat',sans-serif;
    font-weight:900;
    font-size:18px;
    color:white;
    background:#7b4f2c;
    border-radius:35px;
}

}
</style>
</head>
<body>

<!-- ================= DESKTOP ================= -->
<div class="desktop">

<div class="hero-desktop">
<img src="Foto1.jpeg">

</body>
</html>
