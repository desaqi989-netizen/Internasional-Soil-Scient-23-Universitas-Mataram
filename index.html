<style>
body{
    margin:0;
    background:#4b3222;
    font-family:Arial, sans-serif;
}

/* ================= DESKTOP ================= */

.hero{
    position:relative;
    width:100%;
    height:60vh;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(65%);
    animation:gerakDesktop 6s ease-in-out infinite alternate;
}

@keyframes gerakDesktop{
    0%{transform:translateY(0);}
    100%{transform:translateY(-40px);}
}

.judul-box{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(123,79,44,0.9);
    padding:15px 40px;
    border-radius:25px;
}

.judul{
    font-family:'Montserrat',sans-serif;
    font-size:30px;
    color:white;
    margin:0;
    text-transform:uppercase;
}

.container{
    display:flex;
    justify-content:space-between;
    width:90%;
    margin:40px auto;
}

.sidebar{
    width:200px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.sidebar img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:18px;
}

.menu{
    width:280px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
}

.menu a{
    width:220px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-family:'Montserrat',sans-serif;
    font-weight:900;
    font-size:24px;
    color:white;
    background:#7b4f2c;
    border-radius:40px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.hero{
    height:auto; /* ikut tinggi asli foto */
    overflow:visible;
}

.hero img{
    width:100%;
    height:auto; /* supaya full terlihat semua */
    object-fit:contain; /* tidak crop */
    filter:brightness(65%);
    animation:none; /* biar tidak geser dan tidak kepotong */
    display:block;
}

.judul-box{
    width:85%;
    bottom:30px;
    padding:10px;
}

.judul{
    font-size:18px;
    text-align:center;
}

/* SIDEBAR JADI HORIZONTAL DI HP */
.sidebar{
    flex-direction:row;
    overflow:hidden;
}

.sidebar-track{
    display:flex;
    gap:15px;
    animation:scrollCepat 8s linear infinite;
}

.sidebar img{
    width:170px;
    height:120px;
    flex-shrink:0;
}

/* sembunyikan struktur vertikal asli di HP */
.sidebar > img{
    display:none;
}

@keyframes scrollCepat{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

.container{
    flex-direction:column;
    align-items:center;
    gap:40px;
}

.menu{
    gap:25px;
}

.menu a{
    width:85%;
    height:60px;
    font-size:18px;
}

}
</style>
