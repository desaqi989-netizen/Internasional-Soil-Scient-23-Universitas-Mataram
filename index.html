<!DOCTYPE html>
<html>
<head>
    <title>Internasional Soil Sciens</title>
    <meta name="description" content="Website tentang Internasional Soil Science dan ilmu tanah">
    <meta name="keywords" content="soil science, ilmu tanah, internasional soil">
    <meta name="author" content="Nama Kamu">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #4b3222;
            font-family: Arial, sans-serif;
        }

        /* ================= DESKTOP ================= */

        .hero {
            position: relative;
            width: 100%;
            height: 60vh;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 250%;
            object-fit: cover;
            filter: brightness(65%);
            animation: gerakAtasBawah 4s ease-in-out infinite alternate;
        }

        @keyframes gerakAtasBawah {
            0% { transform: translateY(0); }
            100% { transform: translateY(-600px); }
        }

        .judul-box {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(123, 79, 44, 0.85);
            padding: 15px 40px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .judul {
            font-family: 'Montserrat', sans-serif;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 2px;
            color: white;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.7);
        }

        .container-side {
            display: flex;
            justify-content: space-between;
            width: 90%;
            margin: 40px auto 60px auto;
        }

        /* SIDEBAR DIPERLEBAR */
        .sidebar {
            width: 200px; /* lebih lebar */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* FOTO DIPERPANJANG */
        .sidebar img {
            width: 100%;
            height: 140px; /* lebih tinggi */
            object-fit: cover;
            border-radius: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.5);
        }

        /* ================= VERSI HP ================= */

        @media (max-width: 768px) {

            .hero {
                height: 300px;
            }

            .hero img {
                height: 100%;
                width: 100%;
                object-fit: cover;
                animation: gerakHP 6s ease-in-out infinite alternate;
            }

            @keyframes gerakHP {
                0% { transform: translateY(0); }
                100% { transform: translateY(-150px); }
            }

            .judul {
                font-size: 28px;
                text-align: center;
            }

            .judul-box {
                bottom: 20px;
                padding: 10px 20px;
                width: 80%;
                text-align: center;
            }

            .container-side {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                width: 100%;
            }

            .sidebar {
                width: 95%;
                flex-direction: row;
                overflow-x: auto;
                gap: 15px;
            }

            /* FOTO VERSI HP LEBIH BESAR */
            .sidebar img {
                width: 150px;
                height: 110px;
                flex-shrink: 0;
            }
        }

    </style>
</head>
<body>

    <div class="hero">
        <img src="Foto1.jpeg">
        <div class="judul-box">
            <h1 class="judul">Internasional Soil Sciens</h1>
        </div>
    </div>

    <div class="container-side">

        <div class="sidebar">
            <img src="Foto2.jpeg">
            <img src="Foto3.jpeg">
            <img src="Foto4.jpeg">
            <img src="Foto5.jpeg">
            <img src="Foto6.jpeg">
            <img src="Foto7.jpeg">
        </div>

        <div class="sidebar">
            <img src="Foto8.jpeg">
            <img src="Foto9.jpeg">
            <img src="Foto10.jpeg">
            <img src="Foto11.jpeg">
            <img src="Foto12.jpeg">
            <img src="Foto13.jpeg">
        </div>

    </div>

</body>
</html>
